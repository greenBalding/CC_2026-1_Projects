<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div id="navbar-root"></div>

    <main class="container py-4">
        <h1 id="page-title" class="h3 mb-3">Assinaturas e Pagamentos</h1>

        <div id="msg-financeiro" class="alert d-none" role="alert"></div>

        <section class="mb-4">
            <h2 class="h5">Planos</h2>
            <div class="row g-3" id="lista-planos"></div>
        </section>

        <section class="mb-4">
            <h2 class="h5">Pagamento</h2>
            <form id="form-checkout" class="row g-3">
                <div class="col-12 col-md-4">
                    <label for="checkout-plano" class="form-label">Plano</label>
                    <select id="checkout-plano" class="form-select" required></select>
                </div>
                <div class="col-12 col-md-4">
                    <label for="checkout-metodo" class="form-label">Metodo de pagamento</label>
                    <select id="checkout-metodo" class="form-select" required>
                        <option value="Cartao de Credito">Cartao de Credito</option>
                        <option value="PIX">PIX</option>
                        <option value="Boleto">Boleto</option>
                    </select>
                </div>
                <div class="col-12 col-md-4 d-grid align-content-end">
                    <button type="submit" class="btn btn-primary">Pagar e Assinar</button>
                </div>
            </form>
        </section>

        <section class="mb-4">
            <h2 class="h5">Historico de Assinaturas</h2>
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>ID Plano</th>
                            <th>Inicio</th>
                            <th>Fim</th>
                        </tr>
                    </thead>
                    <tbody id="table-assinaturas-body"></tbody>
                </table>
            </div>
        </section>

        <section>
            <h2 class="h5">Historico de Pagamentos</h2>
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Valor</th>
                            <th>Metodo</th>
                            <th>Transacao</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody id="table-pagamentos-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/app/session.js"></script>
    <script src="./js/app/db.js"></script>
    <script src="./js/app/layout.js"></script>
    <script src="./js/modelo-de-dados/negocio/Assinaturas.js"></script>
    <script src="./js/modelo-de-dados/negocio/Pagamentos.js"></script>
    <script src="./js/pages/financeiro.js"></script>
</body>
</html>
