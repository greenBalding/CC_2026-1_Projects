<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Plataforma de Cursos</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 text-center mb-4">Entrar</h1>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input id="email" name="email" type="email" class="form-control" placeholder="seuemail@exemplo.com" required>
                            </div>

                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha</label>
                                <input id="senha" name="senha" type="password" class="form-control" placeholder="Digite sua senha" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Confirmar</button>
                        </form>
                        <div id="loginMessage" class="alert d-none" role="alert"></div>
                        <div id="cadastroSuccessMessage" class="alert alert-success d-none mt-3" role="alert"></div>

                        <button class="btn btn-link w-100 mt-3" type="button" data-bs-toggle="modal" data-bs-target="#cadastroModal">
                            Cadastrar usuário
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="cadastroModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title fs-5">Cadastrar usuário</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body p-0">
                    <iframe
                        src="./cadastro-usuario.html"
                        title="Cadastrar usuario"
                        style="width: 100%; height: 430px; border: 0;"
                    ></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/bootstrap.bundle.min.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/auth.js"></script>
</body>
</html>
