<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar usuario</title>
  <link rel="stylesheet" href="./css/bootstrap.min.css">
</head>
<body class="bg-light">
  <main class="container py-3">
    <h2 class="h5 mb-3">Cadastrar novo usuario</h2>

    <form id="registerForm">
      <div class="mb-3">
        <label for="novoNome" class="form-label">Nome completo</label>
        <input id="novoNome" type="text" class="form-control" placeholder="Seu nome" required>
      </div>

      <div class="mb-3">
        <label for="novoEmail" class="form-label">Email</label>
        <input id="novoEmail" type="email" class="form-control" placeholder="novoemail@exemplo.com" required>
      </div>

      <div class="mb-3">
        <label for="novaSenha" class="form-label">Senha</label>
        <input id="novaSenha" type="password" class="form-control" placeholder="Crie uma senha" required>
      </div>

      <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
    </form>

    <div id="registerMessage" class="alert d-none mt-3" role="alert"></div>
  </main>

  <script src="./js/cadastro-usuario.js"></script>
</body>
</html>
